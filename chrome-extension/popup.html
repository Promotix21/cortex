<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #313244;
    }
    .header .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, rgba(137,180,250,0.3), rgba(137,180,250,0.1));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #181825;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.connected { background: #a6e3a1; }
    .dot.disconnected { background: #f38ba8; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      padding: 10px 12px;
      border-radius: 8px;
      background: #181825;
      text-align: center;
    }
    .stat .value { font-size: 18px; font-weight: 700; color: #89b4fa; }
    .stat .label { font-size: 11px; color: #6c7086; margin-top: 2px; }
    .footer { font-size: 11px; color: #6c7086; text-align: center; padding-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <h1>Cortex Bridge</h1>
  </div>

  <div class="status" id="status-row">
    <div class="dot disconnected" id="status-dot"></div>
    <span id="status-text" style="font-size: 13px; font-weight: 600;">Checking...</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="value" id="error-count">0</div>
      <div class="label">Errors Queued</div>
    </div>
    <div class="stat">
      <div class="value" id="network-count">0</div>
      <div class="label">Network Queued</div>
    </div>
  </div>

  <div class="footer">
    Cortex v0.1.0 — sidecar at localhost:4700
  </div>

  <script src="popup.js"></script>
</body>
</html>
