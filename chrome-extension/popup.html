<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #313244;
    }
    .header .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, rgba(137,180,250,0.3), rgba(137,180,250,0.1));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #181825;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.connected { background: #a6e3a1; }
    .dot.disconnected { background: #f38ba8; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      padding: 10px 12px;
      border-radius: 8px;
      background: #181825;
      text-align: center;
    }
    .stat .value { font-size: 18px; font-weight: 700; color: #89b4fa; }
    .stat .label { font-size: 11px; color: #6c7086; margin-top: 2px; }

    /* Site block section */
    .site-section {
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #181825;
    }
    .site-section .current-site {
      font-size: 13px;
      font-weight: 600;
      color: #89b4fa;
      margin-bottom: 10px;
      word-break: break-all;
    }
    .site-section .site-status {
      font-size: 12px;
      color: #a6e3a1;
      margin-bottom: 8px;
    }
    .site-section .site-status.blocked {
      color: #f38ba8;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-block {
      background: rgba(243, 139, 168, 0.15);
      color: #f38ba8;
    }
    .btn-unblock {
      background: rgba(166, 227, 161, 0.15);
      color: #a6e3a1;
    }

    /* Blocked sites list */
    .blocked-list {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #313244;
    }
    .blocked-list h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      margin-bottom: 6px;
    }
    .blocked-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 12px;
      color: #a6adc8;
    }
    .blocked-item .remove {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
    }
    .blocked-item .remove:hover { color: #f38ba8; }
    .empty-list {
      font-size: 12px;
      color: #6c7086;
      font-style: italic;
    }

    .footer { font-size: 11px; color: #6c7086; text-align: center; padding-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <h1>Cortex Bridge</h1>
  </div>

  <div class="status" id="status-row">
    <div class="dot disconnected" id="status-dot"></div>
    <span id="status-text" style="font-size: 13px; font-weight: 600;">Checking...</span>
  </div>

  <!-- Current site block/unblock -->
  <div class="site-section">
    <div class="current-site" id="current-site">...</div>
    <div class="site-status" id="site-status">Active on this site</div>
    <button class="btn btn-block" id="toggle-btn">Block this site</button>

    <div class="blocked-list">
      <h3>Blocked Sites</h3>
      <div id="blocked-list-items">
        <div class="empty-list">No blocked sites</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="value" id="error-count">0</div>
      <div class="label">Errors Captured</div>
    </div>
    <div class="stat">
      <div class="value" id="network-count">0</div>
      <div class="label">Network Captured</div>
    </div>
  </div>

  <div class="footer">
    Cortex v0.1.0 — sidecar at localhost:4700
  </div>

  <script src="popup.js"></script>
</body>
</html>
